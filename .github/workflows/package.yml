name: Package VS Code extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: forja-syntax/package-lock.json
      - run: npm ci
        working-directory: forja-syntax
      - run: npm run compile
        working-directory: forja-syntax
      - run: rm -f *.vsix
        working-directory: forja-syntax
      - run: npx vsce package
        working-directory: forja-syntax

      - name: Extract version
        id: version
        run: |
          ver=$(node -p 'require("./forja-syntax/package.json").version')
          echo "tag=v${ver}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          artifacts: forja-syntax/*.vsix
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
